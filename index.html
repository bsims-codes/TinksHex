<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tink's Hex</title>
    <style>
        @font-face {
            font-family: 'Tinker Bell';
            src: url('assets/Tinker Bell.ttf') format('truetype');
        }
        body {
            margin: 0;
            padding: 20px;
            background: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .game-container {
            position: relative;
            display: inline-block;
        }
        canvas {
            border: 2px solid #000;
            background: #70c5ce;
            display: block;
        }
        #birdSprite {
            position: absolute;
            pointer-events: none;
            image-rendering: pixelated;
        }
        .admin-link {
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        .admin-link:hover {
            text-decoration: underline;
        }
        #leaderboardBtn {
            margin-top: 10px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #f1c40f 0%, #e67e22 100%);
            border: none;
            border-radius: 5px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #leaderboardBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }
        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            border: 2px solid #4a4a6a;
            border-radius: 15px;
            padding: 25px;
            min-width: 350px;
            max-width: 450px;
            color: #ecf0f1;
            font-family: Arial, sans-serif;
        }
        .modal h2 {
            color: #f1c40f;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: #ecf0f1;
            font-size: 24px;
            cursor: pointer;
            margin-top: -10px;
        }
        .modal-close:hover {
            color: #e74c3c;
        }
        .leaderboard-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid #4a4a6a;
        }
        .leaderboard-list li:last-child {
            border-bottom: none;
        }
        .leaderboard-list .rank {
            color: #f1c40f;
            font-weight: bold;
            width: 30px;
        }
        .leaderboard-list .name {
            flex: 1;
            margin-left: 10px;
        }
        .leaderboard-list .score {
            color: #2ecc71;
            font-weight: bold;
        }
        .leaderboard-list li:nth-child(1) .rank { color: #ffd700; }
        .leaderboard-list li:nth-child(2) .rank { color: #c0c0c0; }
        .leaderboard-list li:nth-child(3) .rank { color: #cd7f32; }
        .no-scores {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
        }
        /* Name entry modal */
        #nameEntry {
            text-align: center;
        }
        #nameEntry p {
            margin-bottom: 15px;
            font-size: 16px;
        }
        #nameEntry .final-score {
            font-size: 32px;
            color: #f1c40f;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #playerNameInput {
            padding: 10px 15px;
            font-size: 16px;
            border: 2px solid #4a4a6a;
            border-radius: 5px;
            background: #16213e;
            color: #ecf0f1;
            width: 100%;
            margin-bottom: 15px;
        }
        #playerNameInput:focus {
            outline: none;
            border-color: #f1c40f;
        }
        #submitScoreBtn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }
        #submitScoreBtn:hover {
            transform: scale(1.05);
        }
        #skipScoreBtn {
            padding: 10px 25px;
            background: #7f8c8d;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        #skipScoreBtn:hover {
            background: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <img id="birdSprite" src="assets/bird.gif" width="60" height="60">
    </div>
    <button id="leaderboardBtn">Leaderboard</button>
    <a href="admin.html" class="admin-link">Asset Manager</a>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="modal-overlay">
        <div class="modal">
            <button class="modal-close" onclick="closeLeaderboard()">&times;</button>
            <h2>Leaderboard</h2>
            <ul id="leaderboardList" class="leaderboard-list">
                <!-- Populated by JavaScript -->
            </ul>
        </div>
    </div>

    <!-- Name Entry Modal -->
    <div id="nameEntryModal" class="modal-overlay">
        <div class="modal">
            <div id="nameEntry">
                <h2>Game Over!</h2>
                <p>Your Score:</p>
                <div id="finalScoreDisplay" class="final-score">0</div>
                <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="20">
                <div>
                    <button id="submitScoreBtn">Submit Score</button>
                    <button id="skipScoreBtn">Skip</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
